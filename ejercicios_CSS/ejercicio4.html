<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo maquetacion</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background-color: white;
            height: 99vh;
            width: 100%;
        }

        .seccion-1{
            background-color: #8A2BE2;
            color: #ADFF2F;
            width: 100%;
            height: 15%;
            text-align: center;
            font-size: 20px;
            border-radius: 12px;
            margin: 1px;
        }

        .seccion-2{
            background-color: #5F9EA0;
            width: 100%;
            height: 10%;
            float: left;
            border-radius: 12px;
            margin: 1px;
        }

        .seccion-3{
            background-color: #7FFFD4;
            width: 58%;
            height: 64%;
            float: left;
            border-radius: 12px;
            margin: 1px;
        }

        .seccion-4{
            background-color: #DEB887;
            width: 40%;
            height: 64%;
            float: right;
            border-radius: 12px;
            margin: 1px;
        }

        .seccion-5{
            background-color: #556B2F;
            width: 100%;
            height: 11%;
            float: left;
            border-radius: 12px;
            margin: 1px;
        }
        .seccion-3 p {
            color: aliceblue;
            border-radius: 12px;
            padding: 25px;
            background-color: red;
            height: 90px;
            margin-bottom: 2px;

        }
    </style>
</head>
<body>
    <div class="seccion-1">Ejemplo maquetacion</div>
    <div class="seccion-2"></div>
    <div class="seccion-3">
        <p>Articulo1</p>
        <p>Articulo2</p>
        <p>Articulo3</p>
        <p>Articulo4</p>
        <p>Articulo5</p>
    </div>
    <div class="seccion-4"></div>
    <div class="seccion-5"></div>
</body>
</html>
